<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Helder Flow - Artista musical">
<title>Helder Flow</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Roboto', sans-serif;
    background: #0f0f0f;
    color: #fff;
}

/* HEADER */
header {
    background: #000;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
}

header h1 {
    color: #e50914;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* IMAGEM */
.cover-container {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
}

.cover {
    width: 100%;
    filter: brightness(0.6);
    transition: 0.5s;
}

.cover-container:hover .cover {
    transform: scale(1.05);
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, black, transparent);
}

.cover-text {
    position: absolute;
    bottom: 20px;
    left: 20px;
}

.cover-text h2 {
    font-size: 2em;
}

/* BOTÕES */
.btn {
    display: block;
    background: #e50914;
    padding: 15px;
    margin-top: 10px;
    text-align: center;
    border-radius: 30px;
    color: white;
    text-decoration: none;
}

/* SECTIONS */
section {
    margin-top: 30px;
}

h2 {
    color: #e50914;
    margin-bottom: 10px;
}

/* REDES */
.social a {
    display: block;
    margin-top: 10px;
    color: white;
    text-decoration: none;
}

/* TROCAR IMAGEM */
.upload {
    margin-top: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 30px;
    padding: 20px;
    background: #000;
}
</style>
</head>

<body>

<header>
    <h1>Helder Flow</h1>
</header>

<div class="container">

<!-- IMAGEM COM TROCA -->
<div class="cover-container">
    <img src="capa.jpg" id="preview" class="cover">
    <div class="overlay"></div>
    <div class="cover-text">
        <h2>Helder Flow</h2>
        <p>Drill • Trap • New Wave</p>
    </div>
</div>

<!-- BOTÃO TROCAR IMAGEM -->
<input type="file" class="upload" accept="image/*" onchange="trocarImagem(event)">

<section>
<h2>Biografia</h2>
<p>
Helder Flow, também conhecido como Hélder Cristiano José Zango Marques,
é um artista em crescimento focado na música e evolução.
</p>
</section>

<section>
<h2>Ouvir Música</h2>

<a href="https://www.youtube.com/results?search_query=Hélder+Cristiano+José+Zango+Marques" target="_blank" class="btn">
YouTube
</a>

<a href="https://audiomack.com/" target="_blank" class="btn">
Audiomack
</a>

</section>

<section>
<h2>Redes Sociais</h2>

<div class="social">

<a href="https://www.youtube.com/results?search_query=Hélder+Cristiano+José+Zango+Marques" target="_blank">
YouTube
</a>

<a href="https://www.instagram.com/eldercristianojoseSangolMarques" target="_blank">
Instagram
</a>

<a href="https://www.tiktok.com/@helderzangomarques" target="_blank">
TikTok
</a>

</div>

</section>

</div>

<footer>
© 2026 Helder Flow
</footer>

<script>
function trocarImagem(event) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById("preview").src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
