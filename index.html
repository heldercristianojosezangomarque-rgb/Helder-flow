<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hélder Flow</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
}

.header img {
  width: 120px;
  border-radius: 50%;
}

.header h1 {
  margin: 10px 0;
}

/* PLAYER FIXO */
.player-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.player-bar button {
  background: #ff004f;
  border: none;
  padding: 10px;
  border-radius: 50%;
  color: white;
}

/* LISTA */
.music-list {
  padding: 20px;
}

.music {
  display: flex;
  align-items: center;
  background: #1a1a1a;
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.music img {
  width: 50px;
  border-radius: 10px;
  margin-right: 10px;
}

/* PROGRESS */
.progress {
  width: 100%;
}

/* BOTÕES */
.links a {
  display: block;
  margin: 10px;
  padding: 15px;
  text-align: center;
  background: linear-gradient(45deg,#ff004f,#ff7a00);
  border-radius: 30px;
  color: white;
  text-decoration: none;
}

/* APOIO */
.support {
  padding: 20px;
}
</style>
</head>

<body>

<div class="header">
  <img src="capa.jpg">
  <h1>Hélder Flow</h1>
</div>

<!-- MÚSICAS -->
<div class="music-list">

<div class="music" onclick="playMusic('musica.mp3','Flow Infinito')">
  <img src="capa.jpg">
  <span>Flow Infinito</span>
</div>

<div class="music" onclick="playMusic('musica2.mp3','Trap Night')">
  <img src="capa.jpg">
  <span>Trap Night</span>
</div>

</div>

<!-- REDES -->
<div class="links">
  <a href="#">TikTok</a>
  <a href="#">YouTube</a>
  <a href="#">Instagram</a>
</div>

<!-- APOIO -->
<div class="support">
  <h2>💰 Apoiar</h2>
  <img src="paypal.png" width="120">
  <img src="pix.png" width="120">
</div>

<!-- PLAYER -->
<div class="player-bar">
  <span id="title">Nenhuma música</span>

  <div>
    <button onclick="prev()">⏮️</button>
    <button onclick="play()">▶️</button>
    <button onclick="pause()">⏸️</button>
    <button onclick="next()">⏭️</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let title = document.getElementById("title");

let playlist = [
  {src:"musica.mp3", name:"Flow Infinito"},
  {src:"musica2.mp3", name:"Trap Night"}
];

let current = 0;

function playMusic(src,name){
  audio.src = src;
  title.innerText = name;
  audio.play();
}

function play(){
  audio.play();
}

function pause(){
  audio.pause();
}

function next(){
  current = (current + 1) % playlist.length;
  playMusic(playlist[current].src, playlist[current].name);
}

function prev(){
  current = (current - 1 + playlist.length) % playlist.length;
  playMusic(playlist[current].src, playlist[current].name);
}
</script>

</body>
</html>
