<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helder Flow</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      margin: 15px;
      padding: 15px;
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(255,0,0,0.3);
    }

    img {
      width: 100%;
      border-radius: 15px;
    }

    h2 {
      margin-top: 20px;
    }

    .btn {
      display: block;
      margin: 15px;
      padding: 15px;
      background: red;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .social a {
      display: block;
      margin: 10px;
      color: white;
      text-decoration: none;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      color: gray;
    }
  </style>
</head>

<body>

<header>Helder Flow</header>

<div class="card">
  <img src="capa.jpg" alt="Helder Flow">
  <h2>Drill • Trap</h2>
</div>

<div class="card">
  <h2>Biografia</h2>
  <p>
    Helder Flow, também conhecido como Hélder Cristiano José Zango Marques.
    Artista focado em Drill e Trap, trazendo energia e visão única.
  </p>
</div>

<div class="card">
  <h2>Música</h2>

  <!-- PLAYER AUDIOMACK -->
  <iframe 
    src="https://audiomack.com/embed/artist/song"
    scrolling="no" width="100%" height="252" frameborder="0">
  </iframe>

  <a class="btn" href="https://audiomack.com" target="_blank">
    Ouvir no Audiomack
  </a>
</div>

<div class="card social">
  <h2>Redes</h2>
  <a href="https://youtube.com" target="_blank">YouTube</a>
  <a href="https://instagram.com" target="_blank">Instagram</a>
  <a href="https://tiktok.com" target="_blank">TikTok</a>
</div>

<div class="card">
  <h2>Apoiar</h2>
  <a class="btn" href="#">Apoiar 💰</a>
</div>

<footer>© 2026 Helder Flow</footer>

</body>
</html>
