<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helder Flow</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(black, #0a0a0a);
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px;
  font-size: 34px;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 20px;
}

.hero img {
  width: 90%;
  max-width: 350px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,0,0,0.5);
}

.play-btn {
  margin-top: 15px;
  padding: 15px 25px;
  background: red;
  border-radius: 50px;
  display: inline-block;
  cursor: pointer;
  transition: 0.3s;
}

.play-btn:hover {
  transform: scale(1.1);
  background: darkred;
}

/* SECTIONS */
.section {
  margin: 20px;
  padding: 20px;
  background: #111;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

/* PLAYER */
iframe {
  width: 100%;
  height: 252px;
  border-radius: 10px;
  border: none;
}

/* LINKS */
.links a {
  display: block;
  margin: 10px;
  padding: 15px;
  background: #222;
  border-radius: 30px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.links a:hover {
  background: red;
}

/* BUTTON */
.btn {
  display: block;
  text-align: center;
  margin: 15px auto;
  padding: 15px;
  width: 80%;
  background: red;
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

/* FOOTER */
footer {
  text-align: center;
  margin: 30px;
  color: gray;
}
</style>

</head>

<body>

<header>Helder Flow</header>

<!-- CAPA -->
<div class="hero">
  <img src="capa.jpg" alt="Helder Flow">

  <!-- BOTÃO PLAY -->
  <div class="play-btn" onclick="mostrarPlayer()">
    ▶️ Ouvir Agora
  </div>
</div>

<!-- PLAYER ESCONDIDO -->
<div class="section" id="player" style="display:none;">
  <iframe 
    src="https://audiomack.com/embed/heldercristianojosezangomarque/song/sonhos-do-flow">
  </iframe>

  <a class="btn" href="https://audiomack.com/heldercristianojosezangomarque/song/sonhos-do-flow" target="_blank">
    Ouvir no Audiomack
  </a>
</div>

<!-- BIO -->
<div class="section">
  <h2>🎤 Biografia</h2>
  <p>
    Helder Flow (Hélder Cristiano José Zango Marques) é um artista de Drill & Trap,
    focado em evolução, autenticidade e impacto real na música.
  </p>
</div>

<!-- LINKS -->
<div class="section links">
  <h2>🌍 Meus Links</h2>

  <a href="https://tiktok.com/@helderzangomarques" target="_blank">
    🎵 TikTok
  </a>

  <a href="https://www.instagram.com/edmilsonmmarquinho" target="_blank">
    📸 Instagram
  </a>

  <a href="https://youtube.com/@heldercristianojosezangomarque" target="_blank">
    🎥 YouTube
  </a>

</div>

<!-- APOIO -->
<div class="section">
  <h2>💰 Apoiar</h2>
  <a class="btn" href="#">Apoiar o artista</a>
</div>

<footer>© 2026 Helder Flow</footer>

<script>
function mostrarPlayer() {
  document.getElementById("player").style.display = "block";
}
</script>

</body>
</html>
