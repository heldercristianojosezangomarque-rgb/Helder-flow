<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buters Music</title>
  <style>
    /* Fundo e corpo */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: url('https://i.imgur.com/EXEMPLO.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
      text-shadow: 0 0 15px black;
    }

    /* Título */
    h1 {
      font-size: 3em;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: 2px;
    }

    /* Player container */
    .player {
      background: rgba(0,0,0,0.6);
      padding: 20px 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px black;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      width: 90%;
    }

    button {
      padding: 10px 25px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff0066;
      color: white;
      transition: transform 0.2s, background 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff3399;
    }

    .socials {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 15px;
    }

    .socials a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      transition: 0.3s;
    }

    .socials a:hover {
      background: rgba(255,255,255,0.5);
      transform: scale(1.1);
    }

    iframe {
      border-radius: 15px;
      border: none;
      width: 100%;
      height: 150px;
    }

    @media (max-width: 500px){
      h1 { font-size: 2em; }
      button { font-size: 1em; padding: 8px 20px; }
    }
  </style>
</head>
<body>

  <h1>Buters Music</h1>

  <div class="player">
    <!-- Player Audiomack embutido -->
    <iframe src="https://audiomack.com/embed/heldercristianojosezangomarque/song/sonhos-do-flow" allow="autoplay"></iframe>

    <!-- Botão play/pause opcional -->
    <button id="playPause">Play/Pause</button>

    <!-- Redes sociais -->
    <div class="socials">
      <a href="https://www.tiktok.com/@helderzangomarques" target="_blank">TikTok</a>
      <a href="https://youtube.com/@heldercristianojosezangomarque?si=9EavaQtNeSXs8q2z" target="_blank">YouTube</a>
    </div>
  </div>

  <script>
    // Controle do play/pause do embed (funciona em alguns navegadores)
    const btn = document.getElementById('playPause');
    btn.addEventListener('click', () => {
      const iframe = document.querySelector('iframe');
      // Manda mensagem para o player tentar pausar/reproduzir (depende do suporte do Audiomack)
      iframe.contentWindow.postMessage('{"event":"playpause"}','*');
    });
  </script>

</body>
</html>
