<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helder Flow</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header {
    background:black;
    padding:20px;
    text-align:center;
}

/* CONTAINER */
.container {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

/* IMAGEM PROFISSIONAL */
.cover-container {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 10px;
}

.cover {
    width: 100%;
    display: block;
    filter: brightness(0.7);
    transition: transform 0.5s ease;
}

.cover-container:hover .cover {
    transform: scale(1.05);
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.cover-text {
    position: absolute;
    bottom: 20px;
    left: 20px;
}

.cover-text h2 {
    font-size: 2em;
}

/* BOTÕES */
.btn {
    display:block;
    background:#e50914;
    padding:15px;
    margin-top:10px;
    text-align:center;
    border-radius:30px;
    color:white;
    text-decoration:none;
}

/* SEÇÕES */
section {
    margin-top:30px;
}

/* REDES */
.social a {
    display:block;
    margin-top:10px;
    color:white;
    text-decoration:none;
}

/* INPUT */
.upload {
    margin-top:10px;
}

/* FOOTER */
footer {
    text-align:center;
    padding:20px;
    margin-top:30px;
    background:black;
}
</style>
</head>

<body>

<header>
<h1>Helder Flow</h1>
</header>

<div class="container">

<!-- IMAGEM -->
<div class="cover-container">
    <img src="capa.jpg" id="preview" class="cover">
    <div class="overlay"></div>
    <div class="cover-text">
        <h2>Helder Flow</h2>
        <p>Drill • Trap</p>
    </div>
</div>

<!-- TROCAR IMAGEM (CORRIGIDO) -->
<input type="file" class="upload" accept="image/*" id="fileInput">

<section>
<h2>Biografia</h2>
<p>Helder Flow, também conhecido como Hélder Cristiano José Zango Marques.</p>
</section>

<section>
<h2>Música</h2>

<!-- PLAYER -->
<iframe width="100%" height="200"
src="https://www.youtube.com/embed?listType=search&list=Hélder+Cristiano+José+Zango+Marques"
frameborder="0" allowfullscreen></iframe>

<a href="https://audiomack.com/" target="_blank" class="btn">Audiomack</a>

</section>

<section>
<h2>Redes</h2>

<div class="social">
<a href="https://www.youtube.com/results?search_query=Hélder+Cristiano+José+Zango+Marques" target="_blank">YouTube</a>

<a href="https://www.instagram.com/eldercristianojoseSangolMarques" target="_blank">Instagram</a>

<a href="https://www.tiktok.com/@helderzangomarques" target="_blank">TikTok</a>
</div>

</section>

<section>
<h2>Apoiar</h2>
<a href="#" class="btn">Apoiar 💰</a>
</section>

</div>

<footer>
© 2026 Helder Flow
</footer>

<script>
// 🔥 CORREÇÃO REAL DO BUG
const input = document.getElementById("fileInput");
const preview = document.getElementById("preview");

input.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            preview.src = e.target.result;

            // salva no navegador (NÃO perde ao atualizar)
            localStorage.setItem("imagem", e.target.result);
        }
        reader.readAsDataURL(file);
    }
});

// carregar imagem salva
const savedImage = localStorage.getItem("imagem");
if(savedImage){
    preview.src = savedImage;
}
</script>

</body>
</html>
